<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF8"/>
      <stop offset="100%" stop-color="#F4F2EE"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D5A3D"/>
      <stop offset="100%" stop-color="#1F4029"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#2D5A3D" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Right side accent panel -->
  <rect x="800" y="0" width="400" height="630" fill="url(#accent)"/>

  <!-- Monogram circle on right -->
  <circle cx="1000" cy="240" r="120" fill="none" stroke="#fbc908" stroke-width="3" opacity="0.85"/>
  <circle cx="1000" cy="240" r="95" fill="none" stroke="#fbc908" stroke-width="2" opacity="0.5"/>
  <text x="1000" y="285" font-family="Georgia, 'Cormorant Garamond', serif" font-size="140" font-weight="500" fill="#FAFAF8" text-anchor="middle">Я</text>

  <!-- Pulse dot on hero (accent) -->
  <circle cx="80" cy="120" r="8" fill="#fbc908"/>

  <!-- Status tag -->
  <text x="100" y="125" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="14" font-weight="600" letter-spacing="2" fill="#1F4029">БЕРУ 3 ПРОЕКТА В ЭТОМ МЕСЯЦЕ</text>

  <!-- Main headline -->
  <text x="80" y="220" font-family="'Cormorant Garamond', Georgia, serif" font-size="46" font-weight="500" fill="#1A1A1A">Янина Чижевская</text>
  <text x="80" y="275" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="22" font-weight="400" fill="#4A5A50">продакт-овнер приложений</text>
  <text x="80" y="308" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="22" font-weight="400" fill="#4A5A50">
    <tspan fill="#B5886A" font-weight="700">с AI</tspan>
    <tspan> в нише здоровья</tspan>
  </text>

  <!-- Subline -->
  <text x="80" y="395" font-family="'Cormorant Garamond', Georgia, serif" font-size="34" font-style="italic" fill="#1A1A1A">Запускаю AI-продукты</text>
  <text x="80" y="438" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="19" font-weight="400" fill="#4A5A50">для экспертов, стартапов и компаний.</text>
  <text x="80" y="465" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="19" font-weight="600" fill="#1A1A1A">От первого звонка до подписчиков — за 2–3 месяца.</text>

  <!-- Bottom-left brand mark -->
  <text x="80" y="565" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="22" font-weight="700" fill="#2D5A3D">Chizhevskaya<tspan fill="#1A1A1A" font-weight="400">.pro</tspan></text>

  <!-- Bottom-left bullets -->
  <text x="80" y="595" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="13" font-weight="500" fill="#4A5A50">10 лет в продукте  ·  6 живых AI-продуктов  ·  Россия · UK · США</text>

  <!-- Bottom-right CTA hint -->
  <text x="1000" y="555" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="1.5" fill="#fbc908" text-anchor="middle">БЕСПЛАТНЫЙ AI-АУДИТ</text>
  <text x="1000" y="585" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="16" font-weight="500" fill="#FAFAF8" text-anchor="middle">за 5 дней →</text>
</svg>
